<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg">

<!-- 🔝 NAVBAR -->
<div class="navbar">
    <div class="logo">📧 Spam Detector</div>
    <div class="nav-right">
        <a href="/">Home</a>
        <a href="/profile">Profile</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="dashboard-container">

    <!-- 📊 CHART -->
    <div class="glass-card">
        <h2>Spam Analysis</h2>
        <canvas id="chart"></canvas>
    </div>

    <!-- 📜 HISTORY -->
    <div class="glass-card">
        <h2>Email History</h2>

        <div class="history-box">
            {% for email, result in history %}
                <div class="history-item">
                    <p>{{ email }}</p>
                    <span class="{{ 'spam' if result=='Spam' else 'safe' }}">
                        {{ result }}
                    </span>
                </div>
            {% endfor %}
        </div>
    </div>

</div>

<!-- ✅ SCRIPTS (ONLY ONCE) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<script>
    const data = {{ stats|tojson }};

    let spam = 0;
    let notspam = 0;

    data.forEach(item => {
        if(item[0] === "Spam") spam = item[1];
        else notspam = item[1];
    });

    new Chart(document.getElementById("chart"), {
        type: "pie",
        data: {
            labels: ["🚨 Spam", "✅ Not Spam"],   // 🔥 updated labels
            datasets: [{
                data: [spam, notspam],
                backgroundColor: ["#ff5252", "#00e676"],
                borderColor: "#121212",
                borderWidth: 2
            }]
        },
        options: {
            plugins: {

                // ✅ LEGEND STYLE (TEXT DARK/BOLD)
                legend: {
                    position: "top",
                    labels: {
                        color: "#ffffff",
                        font: {
                            size: 15,
                            weight: "bold"
                        },
                        padding: 20
                    }
                },

                // ✅ NUMBERS INSIDE PIE
                datalabels: {
                    color: "#fff",
                    font: {
                        weight: "bold",
                        size: 16
                    },
                    formatter: (value, context) => {
                        let total = context.chart.data.datasets[0].data
                            .reduce((a, b) => a + b, 0);

                        let percent = (value / total * 100).toFixed(1);
                        return value + " (" + percent + "%)";
                    }
                }
            }
        },
        plugins: [ChartDataLabels]
    });
</script>

</body>
</html>
